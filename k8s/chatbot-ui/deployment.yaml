apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-ui
  namespace: prism
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatbot-ui
  template:
    metadata:
      labels:
        app: chatbot-ui
    spec:
      containers:
      - name: chatbot-ui
        image: IMAGE_REGISTRY/prism-chatbot-ui:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: CHATBOT_API_URL
          valueFrom:
            configMapKeyRef:
              name: prism-config
              key: CHATBOT_API_URL
        - name: NODE_ENV
          value: "production"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
