apiVersion: apps/v1
kind: Deployment
metadata:
  name: partition-cron
  namespace: prism
spec:
  replicas: 1
  selector:
    matchLabels:
      app: partition-cron
  template:
    metadata:
      labels:
        app: partition-cron
    spec:
      containers:
      - name: partition-cron
        image: IMAGE_REGISTRY/prism-workers:latest
        imagePullPolicy: Always
        command:
        - python
        - -m
        - partition_cron.main
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: prism-secret
              key: POSTGRES_PASSWORD
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: prism-config
              key: POSTGRES_USER
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: prism-config
              key: POSTGRES_DB
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: prism-config
              key: POSTGRES_HOST
        - name: DATABASE_URL
          value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):5432/$(POSTGRES_DB)"
        - name: PARTITION_RETENTION_DAYS
          valueFrom:
            configMapKeyRef:
              name: prism-config
              key: PARTITION_RETENTION_DAYS
        - name: PRISM_LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: prism-config
              key: PRISM_LOG_LEVEL
