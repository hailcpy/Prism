services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prism}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prism}
      POSTGRES_DB: ${POSTGRES_DB:-prism}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prism}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
      - "--appendonly"
      - "yes"
      - "--save"
      - "60"
      - "1"
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

  # ── Python services ─────────────────────────────────────────────────────────
  # Source is bind-mounted so `docker compose restart <svc>` picks up code edits
  # without a rebuild. The .venv stays inside the image (created at build time).

  chatbot-api:
    image: ${IMAGE_REGISTRY:-ghcr.io/REPLACEME}/prism-chatbot-api:latest
    build:
      context: .
      dockerfile: services/chatbot-api/Dockerfile
    env_file: .env
    command:
      - "uvicorn"
      - "chatbot_api.main:app"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--reload"
      - "--reload-dir"
      - "/app/services"
      - "--reload-dir"
      - "/app/infra"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-prism}:${POSTGRES_PASSWORD:-prism}@postgres:5432/${POSTGRES_DB:-prism}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      INGESTION_URL: http://ingestion-api:8001
      AWS_ACCESS_KEY_ID: ${BEDROCK_AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${BEDROCK_AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION_NAME: ${BEDROCK_AWS_REGION:-us-west-2}
    volumes:
      - ./services:/app/services
      - ./infra:/app/infra
    ports:
      - "8100:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  ingestion-api:
    image: ${IMAGE_REGISTRY:-ghcr.io/REPLACEME}/prism-ingestion-api:latest
    build:
      context: .
      dockerfile: services/ingestion-api/Dockerfile
    env_file: .env
    command:
      - "uvicorn"
      - "ingestion_api.main:app"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8001"
      - "--reload"
      - "--reload-dir"
      - "/app/services"
      - "--reload-dir"
      - "/app/infra"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-prism}:${POSTGRES_PASSWORD:-prism}@postgres:5432/${POSTGRES_DB:-prism}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - ./services:/app/services
      - ./infra:/app/infra
    ports:
      - "8101:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Workers ─────────────────────────────────────────────────────────────────

  log-writer:
    image: ${IMAGE_REGISTRY:-ghcr.io/REPLACEME}/prism-workers:latest
    build:
      context: .
      dockerfile: services/workers/Dockerfile
    command: ["watchfiles", "--filter", "python", "python -m log_writer.main", "/app/services/workers/log_writer", "/app/infra"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-prism}:${POSTGRES_PASSWORD:-prism}@postgres:5432/${POSTGRES_DB:-prism}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - ./services:/app/services
      - ./infra:/app/infra
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  metrics-roller:
    image: ${IMAGE_REGISTRY:-ghcr.io/REPLACEME}/prism-workers:latest
    build:
      context: .
      dockerfile: services/workers/Dockerfile
    command: ["watchfiles", "--filter", "python", "python -m metrics_roller.main", "/app/services/workers/metrics_roller", "/app/infra"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-prism}:${POSTGRES_PASSWORD:-prism}@postgres:5432/${POSTGRES_DB:-prism}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - ./services:/app/services
      - ./infra:/app/infra
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  metrics-reconciler:
    image: ${IMAGE_REGISTRY:-ghcr.io/REPLACEME}/prism-workers:latest
    build:
      context: .
      dockerfile: services/workers/Dockerfile
    command: ["watchfiles", "--filter", "python", "python -m metrics_reconciler.main", "/app/services/workers/metrics_reconciler", "/app/infra"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-prism}:${POSTGRES_PASSWORD:-prism}@postgres:5432/${POSTGRES_DB:-prism}
    volumes:
      - ./services:/app/services
      - ./infra:/app/infra
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  partition-cron:
    image: ${IMAGE_REGISTRY:-ghcr.io/REPLACEME}/prism-workers:latest
    build:
      context: .
      dockerfile: services/workers/Dockerfile
    command: ["watchfiles", "--filter", "python", "python -m partition_cron.main", "/app/services/workers/partition_cron", "/app/infra"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-prism}:${POSTGRES_PASSWORD:-prism}@postgres:5432/${POSTGRES_DB:-prism}
      PARTITION_RETENTION_DAYS: ${PARTITION_RETENTION_DAYS:-30}
    volumes:
      - ./services:/app/services
      - ./infra:/app/infra
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Chatbot UI ──────────────────────────────────────────────────────────────

  chatbot-ui:
    image: ${IMAGE_REGISTRY:-ghcr.io/REPLACEME}/prism-chatbot-ui:latest
    build:
      context: web
      args:
        NEXT_PUBLIC_CHATBOT_API_URL: ${NEXT_PUBLIC_CHATBOT_API_URL:-http://localhost:8100}
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_CHATBOT_API_URL: http://localhost:8100
      CHATBOT_API_URL: http://chatbot-api:8000
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./web:/app
      - chatbot-ui-node-modules:/app/node_modules
      - chatbot-ui-next-cache:/app/.next
    depends_on:
      - chatbot-api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres-data:
  redis-data:
  chatbot-ui-node-modules:
  chatbot-ui-next-cache:
