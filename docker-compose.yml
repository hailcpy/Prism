services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: prism
      POSTGRES_PASSWORD: prism
      POSTGRES_DB: prism
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prism"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Python services ─────────────────────────────────────────────────────────

  chatbot-api:
    build:
      context: .
      dockerfile: services/chatbot-api/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgres://prism:prism@postgres:5432/prism
      REDIS_URL: redis://redis:6379/0
      INGESTION_URL: http://ingestion-api:8001
    ports:
      - "8100:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  ingestion-api:
    build:
      context: .
      dockerfile: services/ingestion-api/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgres://prism:prism@postgres:5432/prism
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8101:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Workers ─────────────────────────────────────────────────────────────────

  log-writer:
    build:
      context: .
      dockerfile: services/workers/Dockerfile
    command: ["python", "-m", "log_writer.main"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://prism:prism@postgres:5432/prism
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  metrics-roller:
    build:
      context: .
      dockerfile: services/workers/Dockerfile
    command: ["python", "-m", "metrics_roller.main"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://prism:prism@postgres:5432/prism
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  metrics-reconciler:
    build:
      context: .
      dockerfile: services/workers/Dockerfile
    command: ["python", "-m", "metrics_reconciler.main"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://prism:prism@postgres:5432/prism
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  partition-cron:
    build:
      context: .
      dockerfile: services/workers/Dockerfile
    command: ["python", "-m", "partition_cron.main"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://prism:prism@postgres:5432/prism
      PARTITION_RETENTION_DAYS: ${PARTITION_RETENTION_DAYS:-30}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Chatbot UI ──────────────────────────────────────────────────────────────

  chatbot-ui:
    build:
      context: web
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_CHATBOT_API_URL: http://localhost:8100
    depends_on:
      - chatbot-api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres-data:
